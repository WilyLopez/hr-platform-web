name: Build and Push Docker Image (Frontend)

on:
  push:
    branches: [ main, principal ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # NEXT_PUBLIC_API_URL queda embebido en el bundle en build-time.
          # Por defecto apunta al Ingress de Kubernetes (ver k8s/07-ingress.yaml).
          # Puedes sobreescribirlo creando una repository variable NEXT_PUBLIC_API_URL
          # en Settings > Secrets and variables > Actions > Variables.
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL || 'http://nexushr.local/api/v1' }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/hr-platform-web:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/hr-platform-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
